<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Manager</title>

<link rel="stylesheet" href="style.css">

</head>


<body>



<div class="wrapper">

    <div class="card">

        <div class="header">

            <h1>📝 Task Manager</h1>

            <p>Stay productive and manage your tasks easily</p>

        </div>


        <div class="input-box">

            <input
                id="taskInput"
                placeholder="Add a new task..."
            >

            <button onclick="addTask()">
                Add
            </button>

        </div>


        <div id="message"></div>


        <div class="section">

            <h3>Pending Tasks</h3>

            <ul id="taskList"></ul>

        </div>

    </div>

</div>

<script src="script.js"></script>


</body>
</html>
